# 开发环境配置

# 继承默认配置
<<: *default

# 覆盖开发特定配置
debug:
  log_level: "DEBUG"

api:
  host: "127.0.0.1"
  port: 8000
  reload: true

session:
  max_age: 1800  # 30分钟

llm:                                                                                                                  
    provider: "anthropic"                                                                                               
    api_key: "${ANTHROPIC_API_KEY}"  # 从环境变量读取                                                                   
    base_url: "${ANTHROPIC_BASE_URL}"  # 可选                                                                           
    model: "claude-3-sonnet"                                                                                            
    max_tokens: 4096                                                                                                    
    timeout: 60
